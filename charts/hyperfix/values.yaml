# Global values
nameOverride: ""
fullnameOverride: ""
replicaCount: 1
# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
# Pod configuration
podAnnotations: {}
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""
# PostgreSQL database configuration
postgresql:
  # Set to true to deploy PostgreSQL as part of this chart
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  # Database configuration
  auth:
    database: hyperfix
    username: hyperfix_user
    password: hyperfix_password
    # Use existing secret for database credentials (optional)
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  # Persistence for PostgreSQL data
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  # PostgreSQL service configuration
  service:
    type: ClusterIP
    port: 5432
  # Resources for PostgreSQL
  resources: {}
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
# HyperFix application configuration (combined API + web frontend)
hyperfix:
  image:
    repository: ghcr.io/samalehzen/hyper
    tag: latest
    pullPolicy: IfNotPresent
  securityContext: {}
  service:
    type: ClusterIP
    port: 5173
    targetPort: 5173
  # Resources are optional and disabled by default
  resources: {}
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  env:
    # Public URL of this HyperFix instance (e.g. https://hyperfix.example.com)
    # KANEO_API_URL is derived automatically as clientUrl/api if not set
    clientUrl: ""
    # Allowed CORS origins. Accepts a comma-separated string or YAML list.
    # Defaults to clientUrl when left empty.
    corsOrigins: []
    # Must be at least 32 characters long for Better Auth
    # Generate with: openssl rand -hex 32
    authSecret: change_me_to_at_least_32_characters_long_string
    existingSecret:
      enabled: false
      name: ""
      key: auth-secret
    disableRegistration: false
    disablePasswordRegistration: false
    # Database configuration
    database:
      # Use external PostgreSQL (set postgresql.enabled to false)
      # Important: when using external postgres, make sure you have set up the db user correctly:
      #   CREATE DATABASE hyperfix;
      #   CREATE USER hyperfix_user WITH PASSWORD 'your_password';
      #   GRANT ALL PRIVILEGES ON DATABASE hyperfix TO hyperfix_user;
      #   \c hyperfix;
      #   GRANT USAGE ON SCHEMA public TO hyperfix_user;
      #   GRANT CREATE ON SCHEMA public TO hyperfix_user;
      #   ALTER SCHEMA public OWNER TO hyperfix_user;
      external:
        enabled: false
        host: ""
        port: 5432
        database: hyperfix
        username: hyperfix_user
        password: ""
        # Use existing secret for external database credentials in the form of a uri, e.g.: "postgresql://user:pass@host:port/db"
        existingSecret:
          enabled: false
          name: ""
          passwordKey: postgres_uri
  # Additional environment variables for the hyperfix container.
  # Each entry is a standard Kubernetes EnvVar (supports `value` or `valueFrom`).
  # Useful for CUSTOM_OAUTH_*, SMTP_*, etc. without editing the chart.
  # extraEnv entries are appended after chart-defined vars; duplicate names override.
  extraEnv: []
  # extraEnv:
  #   - name: CUSTOM_OAUTH_DISCOVERY_URL
  #     value: "https://idp.example.com/.well-known/openid-configuration"
  #   - name: CUSTOM_OAUTH_CLIENT_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: oauth-secret
  #         key: client-id
  livenessProbe:
    httpGet:
      path: /api/health
      port: hyperfix
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/health
      port: hyperfix
    initialDelaySeconds: 30
    periodSeconds: 10
# Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: hyperfix.local
      paths:
        - path: /
          pathType: Prefix
          service: hyperfix
          port: 5173
  tls: []

# Gateway API configuration
gateway:
  enabled: false
  annotations: {}
  labels: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - service: hyperfix
          port: 5173
